name: "Sync Bug Label from Project"
on:
  issues:
    types: [edited, labeled]

jobs:
  sync_label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: read
    steps:
      - name: Sync based on Project Field
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. Get the 'Ticket Type' value for this issue from Project V2
          # Replace PROJECT_ID with your numeric project ID (found in project URL)
          PROJECT_ID="YOUR_PROJECT_NUMBER"
          
          CURRENT_VALUE=$(gh project item-list $PROJECT_ID --owner ${{ github.repository_owner }} --format json | jq -r ".items[] | select(.content.number == $ISSUE_NUMBER) | .fieldValues[] | select(.field.name == \"Ticket Type\") | .value")

          # 2. Add or remove label based on that value
          if [ "$CURRENT_VALUE" == "Bug" ]; then
            gh issue edit $ISSUE_NUMBER --add-label "bug"
          else
            gh issue edit $ISSUE_NUMBER --remove-label "bug"
          fi
